<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I am Respo AI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <button class="primary-btn menu" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample" aria-controls="offcanvasExample">
    Menu
  </button>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="offcanvasExampleLabel">Respo AI</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div>
        Hi I am Respo AI!, a fun and interacting chatbot.
      </div>
      <div class="mt-5">
        <a class="menu-link py-2 px-1" href="">About</a>      
        <a class="menu-link py-2 px-1" href="">Contact</a>
      </div>
      <input type="checkbox" class="theme-checkbox">
    </div>
  </div>
  <h2 class="response text-center mt-5"></h2>

  <div class="row justify-content-center position-fixed bottom-0 start-0 end-0 py-3">
    <div class="col-11 col-md-9 col-lg-4">
      <form>
        <div class="input-group">
          <input type="text" class="prompt form-control" placeholder="Ask Respo AI">
          <button class="trigger bg-secondary btn text-white">Send</button>   
        </div>        
      </form>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="./cpu.js"></script>
</body>
</html>
