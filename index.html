<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I am Respo AI</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="light-theme">
  <div class="header">
    <h4>Respo AI</h4>
    <div class="toggle-button" id="themeToggle">
      <span class="switch"></span>
    </div>
  </div>
  <div class="chat-container" id="chatContainer"></div>
  <div class="input-container">
    <input type="text" id="messageInput" class="prompt" placeholder="Type a message..." />
    <button class="trigger">Send</button>
  </div>
  
  <script src="./cpu.js" type="module"></script>
</body>
</html>
