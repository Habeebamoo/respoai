<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I am Respo AI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="light-theme">
  <div class="menu">
    <div class="toggle-button" id="themeToggle">
      <span class="switch"></span>
    </div>
  </div>
  <h2 class="response text-center mt-5"></h2>

  <div class="row justify-content-center position-fixed bottom-0 start-0 end-0 py-3">
    <div class="col-11 col-md-9 col-lg-4">
  
        <div class="relative rounded-full overflow-hidden bg-white shadow-xl w-72">
          <input
            class="input bg-transparent outline-none border-none pl-6 pr-10 py-5 w-full font-sans text-lg font-semibold prompt"
            placeholder="Hover on Submit"
            name="text"
            type="text"
          />
          <div class="absolute right-2 top-[0.4em]">
            <button
              class="w-14 h-14 rounded-full bg-violet-500 group shadow-xl flex items-center justify-center relative overflow-hidden trigger"
            >
              <svg
                class="relative z-10"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 64 64"
                height="50"
                width="50"
              >
                <path
                  fill-opacity="0.01"
                  fill="white"
                  d="M63.6689 29.0491L34.6198 63.6685L0.00043872 34.6194L29.0496 1.67708e-05L63.6689 29.0491Z"
                ></path>
                <path
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="3.76603"
                  stroke="white"
                  d="M42.8496 18.7067L21.0628 44.6712"
                ></path>
                <path
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="3.76603"
                  stroke="white"
                  d="M26.9329 20.0992L42.85 18.7067L44.2426 34.6238"
                ></path>
              </svg>
              <div
                class="w-full h-full rotate-45 absolute left-[32%] top-[32%] bg-black group-hover:-left-[100%] group-hover:-top-[100%] duration-1000"
              ></div>
              <div
                class="w-full h-full -rotate-45 absolute -left-[32%] -top-[32%] group-hover:left-[100%] group-hover:top-[100%] bg-black duration-1000"
              ></div>
            </button>
          </div>
        </div>
    
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="./cpu.js"></script>
</body>
</html>
