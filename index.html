<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I am Respo AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="favicon" href="assets/favicon.png">
</head>
<body class="light-theme">
  <div class="menu">
    <div class="toggle-button" id="themeToggle">
      <span class="switch"></span>
    </div>
  </div>

  <div class="response-cont">
    <p class="response"></p>
  </div>

  <div class="prompt-container">
    <div class="prompt-box">
      <div class="container">
        <input type="text" class="input-field prompt" placeholder="Type something...">
        <button class="send-button trigger">
            <img src="./assets/arrow.svg" style="color: white;">
        </button>
    </div>
    </div>
  </div>
  
  <script type="module" src="./cpu.js"></script>
</body>
</html>
